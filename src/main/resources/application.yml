project:
  name: Hotspot Batch
  version: 1.0.0

spring:
  application:
    name: batch

  main:
    web-application-type: none

  batch:
    job:
      enabled: false

  profiles:
    default: local

  config:
    import:
      - classpath:postgres.yml
      - classpath:redis.yml
      - classpath:postgres-main.yml
      - classpath:resilience4j.yml
      - classpath:llm-config.yml
      # 로컬 시크릿 파일 (파일이 없을 경우 대비하여 선택적 로드 옵션 추가)
      - optional:classpath:application-local.yml

---
spring:
  config:
    activate:
      on-profile: local

  batch:
    jdbc:
      initialize-schema: always

logging:
  level:
    root: INFO

---
spring:
  config:
    activate:
      on-profile: dev

  batch:
    jdbc:
      initialize-schema: always

logging:
  level:
    root: INFO
